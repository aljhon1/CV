<!DOCTYPE html>
<html>
<head>
    <title>CV Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>CV</h1>

    <form action="process.php" method="POST" enctype="multipart/form-data">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <textarea name="hobby" placeholder="Hobby" required></textarea>

        <textarea name="objective" placeholder="Career Objective" required></textarea>
        <textarea name="education" placeholder="Education" required></textarea>
        <textarea name="skills" placeholder="Skills" required></textarea>

        <label>Upload Profile Picture</label>
        <input type="file" name="profile" accept="image/*" required>

        <button type="submit">Generate CV</button>

    </form>
</div>

</body>
</html>
